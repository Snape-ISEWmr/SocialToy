<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>当代人类身份鉴定中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
    .page { display: none; }
    .page.active { display: flex; }
    .btn-black { width: 100%; background: #000; color: #fff; border: none; padding: 16px 32px; font-size: 18px; font-weight: 500; cursor: pointer; text-align: center; }
    .btn-black:active { background: #333; }
    .btn-outline { width: 100%; background: #fff; color: #000; border: 2px solid #000; padding: 14px 32px; font-size: 16px; font-weight: 500; cursor: pointer; text-align: center; }
    .btn-outline:active { background: #f5f5f5; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 12px 24px; font-size: 14px; z-index: 999; }
  </style>
</head>
<body>

<!-- ========== 首页 ========== -->
<div id="home-page" class="page active flex-col items-center justify-center min-h-screen px-6">
  <div class="flex-1 flex flex-col items-center justify-center w-full max-w-md">
    <h1 class="text-3xl md:text-4xl font-bold text-center mb-16 leading-tight">当代人类身份鉴定中心</h1>
    <div class="flex flex-col gap-5 w-full">
      <button class="btn-black" onclick="startTest('worker')">打工人摸鱼人格测试</button>
      <button class="btn-black" onclick="startTest('love')">恋爱脑等级测试</button>
      <button class="btn-black" onclick="startTest('holiday')">五一假期人格测试</button>
    </div>
  </div>
  <p class="text-gray-400 text-xs text-center pb-8">关注公众号【你的公众号】获取更多测试</p>
</div>

<!-- ========== 测试页面 ========== -->
<div id="test-page" class="page flex-col items-center min-h-screen px-6 pt-8 pb-8">
  <div class="w-full max-w-md flex-1 flex flex-col">
    <!-- 进度条 -->
    <div class="mb-8">
      <div class="flex justify-between text-sm text-gray-500 mb-2">
        <span>答题进度</span>
        <span id="progress-text">1/10</span>
      </div>
      <div class="w-full bg-gray-200 h-2">
        <div id="progress-bar" class="bg-black h-2" style="width:10%"></div>
      </div>
    </div>
    <!-- 题目 -->
    <h2 id="question-text" class="text-xl md:text-2xl font-medium text-center mb-10 leading-relaxed"></h2>
    <!-- 选项 -->
    <div id="options-container" class="flex flex-col gap-4"></div>
  </div>
</div>

<!-- ========== 结果页面 ========== -->
<div id="result-page" class="page flex-col items-center min-h-screen px-6 pt-10 pb-10">
  <div class="w-full max-w-md flex-1 flex flex-col items-center">
    <!-- 核心标签 -->
    <h1 id="result-label" class="text-4xl md:text-5xl font-bold text-center mb-8"></h1>
    <!-- 标签图片（Canvas生成） -->
    <div id="result-image-wrap" class="mb-6 flex justify-center">
      <canvas id="result-canvas" width="200" height="200"></canvas>
    </div>
    <!-- 全国占比 -->
    <p id="result-percentage" class="text-gray-500 text-center text-sm mb-8"></p>
    <!-- 评价内容 -->
    <div id="evaluations-container" class="flex flex-col gap-4 mb-12 w-full"></div>
    <!-- 操作按钮 -->
    <div class="flex flex-col gap-4 w-full">
      <button class="btn-black" onclick="copyResult()">复制结果</button>
      <button class="btn-black" onclick="generateShareImage()">生成分享图</button>
      <button class="btn-outline" onclick="restartTest()">再测一次</button>
    </div>
  </div>
</div>

// ==================== 全局状态 ====================
let currentTest = null;
let currentQuestionIndex = 0;
let answers = [];
let currentResult = null;

// ==================== 页面路由 ====================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });
  document.getElementById(pageId).classList.add('active');
  window.scrollTo(0, 0);
}

// ==================== 开始测试 ====================
function startTest(testType) {
  // 检查是否有保存的进度
  const saved = loadProgress();
  if (saved && saved.testType === testType && saved.currentIndex < 10) {
    currentTest = testType;
    currentQuestionIndex = saved.currentIndex;
    answers = saved.answers;
  } else {
    currentTest = testType;
    currentQuestionIndex = 0;
    answers = [];
  }
  showPage('test-page');
  renderQuestion();
}

// ==================== 渲染题目 ====================
function renderQuestion() {
  const test = TEST_DATA[currentTest];
  const question = test.questions[currentQuestionIndex];

  // 进度
  const progress = ((currentQuestionIndex + 1) / test.questions.length) * 100;
  document.getElementById('progress-text').textContent = `${currentQuestionIndex + 1}/${test.questions.length}`;
  document.getElementById('progress-bar').style.width = progress + '%';

  // 题目
  document.getElementById('question-text').textContent = question.text;

  // 选项
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  question.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-black';
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(opt.type);
    container.appendChild(btn);
  });
}

// ==================== 选择选项 ====================
function selectOption(type) {
  answers.push(type);
  currentQuestionIndex++;
  saveProgress();

  const test = TEST_DATA[currentTest];
  if (currentQuestionIndex >= test.questions.length) {
    // 答完了，计算结果
    currentResult = calculateResult(currentTest, answers);
    clearProgress();
    showResult();
  } else {
    renderQuestion();
  }
}

// ==================== 计算结果 ====================
function calculateResult(testType, ans) {
  const test = TEST_DATA[testType];
  // 统计各类型出现次数
  const counts = {};
  ans.forEach(a => { counts[a] = (counts[a] || 0) + 1; });

  // 排序找出前两个
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const top1 = sorted[0][0];
  const top2 = sorted.length > 1 ? sorted[1][0] : null;

  // 先尝试组合键
  const comboKey1 = top1 + top2;
  const comboKey2 = top2 ? (top2 + top1) : null;

  if (test.results[comboKey1]) {
    return { key: comboKey1, ...test.results[comboKey1] };
  }
  if (comboKey2 && test.results[comboKey2]) {
    return { key: comboKey2, ...test.results[comboKey2] };
  }
  // 回退到主类型
  if (test.results[top1]) {
    return { key: top1, ...test.results[top1] };
  }
  // 默认
  const firstKey = Object.keys(test.results)[0];
  return { key: firstKey, ...test.results[firstKey] };
}

// ==================== 显示结果 ====================
function showResult() {
  showPage('result-page');

  // 标签
  document.getElementById('result-label').textContent = currentResult.label;

  // Canvas标签图片
  drawResultCanvas(currentResult.label);

  // 占比
  document.getElementById('result-percentage').textContent = '全国占比：' + currentResult.percentage;

  // 评价
  const evalContainer = document.getElementById('evaluations-container');
  evalContainer.innerHTML = '';
  currentResult.evaluations.forEach(ev => {
    const p = document.createElement('p');
    p.className = 'text-gray-700 text-center leading-relaxed text-base';
    p.textContent = ev;
    evalContainer.appendChild(p);
  });
}

// ==================== Canvas绘制标签图 ====================
function drawResultCanvas(label) {
  const canvas = document.getElementById('result-canvas');
  const ctx = canvas.getContext('2d');
  const size = 200;
  canvas.width = size;
  canvas.height = size;

  // 白底
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);

  // 黑色边框
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 4;
  ctx.strokeRect(8, 8, size - 16, size - 16);

  // 标签文字
  ctx.fillStyle = '#000000';
  ctx.font = 'bold 28px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // 自动换行
  const maxWidth = size - 40;
  const lines = wrapText(ctx, label, maxWidth);
  const lineHeight = 36;
  const startY = size / 2 - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach((line, i) => {
    ctx.fillText(line, size / 2, startY + i * lineHeight);
  });
}

function wrapText(ctx, text, maxWidth) {
  const chars = text.split('');
  const lines = [];
  let current = '';
  for (const ch of chars) {
    const test = current + ch;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = ch;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

// ==================== 复制结果 ====================
function copyResult() {
  const test = TEST_DATA[currentTest];
  let text = `【${test.title}】\n`;
  text += `我的结果是：${currentResult.label}\n`;
  text += `全国占比：${currentResult.percentage}\n\n`;
  currentResult.evaluations.forEach(ev => { text += ev + '\n\n'; });
  text += '来测测你是什么人格？';

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('复制成功'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('复制成功');
  }
}

// ==================== 生成分享图 ====================
function generateShareImage() {
  const W = 1080, H = 1920;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  const test = TEST_DATA[currentTest];

  // 白底
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // 顶部黑条
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, 8);

  // 测试标题
  ctx.fillStyle = '#737373';
  ctx.font = '32px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(test.title, W / 2, 160);

  // 核心标签 - 超大号
  ctx.fillStyle = '#000000';
  ctx.font = 'bold 96px "PingFang SC", "Microsoft YaHei", sans-serif';
  const labelLines = wrapTextCanvas(ctx, currentResult.label, W - 120, 110);
  const labelStartY = 380;
  labelLines.forEach((line, i) => {
    ctx.fillText(line, W / 2, labelStartY + i * 110);
  });

  // 分割线
  const afterLabelY = labelStartY + labelLines.length * 110 + 60;
  ctx.strokeStyle = '#d4d4d4';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(120, afterLabelY);
  ctx.lineTo(W - 120, afterLabelY);
  ctx.stroke();

  // 全国占比
  ctx.fillStyle = '#737373';
  ctx.font = '36px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('全国占比：' + currentResult.percentage, W / 2, afterLabelY + 80);

  // 评价内容
  ctx.fillStyle = '#404040';
  ctx.font = '34px "PingFang SC", "Microsoft YaHei", sans-serif';
  let evalY = afterLabelY + 180;
  currentResult.evaluations.forEach(ev => {
    const evLines = wrapTextCanvas(ctx, ev, W - 200, 48);
    evLines.forEach((line, i) => {
      ctx.fillText(line, W / 2, evalY + i * 48);
    });
    evalY += evLines.length * 48 + 50;
  });

  // 底部
  ctx.fillStyle = '#a3a3a3';
  ctx.font = '28px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('来测测你是什么人格？', W / 2, H - 120);

  // 底部黑条
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, H - 8, W, 8);

  // 下载
  const dataUrl = canvas.toDataURL('image/png');
  const link = document.createElement('a');
  link.download = currentResult.label + '_测试结果.png';
  link.href = dataUrl;
  link.click();
  showToast('分享图已生成');
}

function wrapTextCanvas(ctx, text, maxWidth, lineHeight) {
  const chars = text.split('');
  const lines = [];
  let current = '';
  for (const ch of chars) {
    const test = current + ch;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = ch;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

// ==================== 重新测试 ====================
function restartTest() {
  currentTest = null;
  currentQuestionIndex = 0;
  answers = [];
  currentResult = null;
  clearProgress();
  showPage('home-page');
}

// ==================== 数据持久化 ====================
function saveProgress() {
  try {
    const data = {
      testType: currentTest,
      currentIndex: currentQuestionIndex,
      answers: answers,
      timestamp: Date.now()
    };
    localStorage.setItem('emotion_test_progress', JSON.stringify(data));
  } catch (e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('emotion_test_progress');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data && typeof data.testType === 'string' && typeof data.currentIndex === 'number' && Array.isArray(data.answers)) {
      return data;
    }
    return null;
  } catch (e) {
    return null;
  }
}

function clearProgress() {
  try {
    localStorage.removeItem('emotion_test_progress');
  } catch (e) {}
}

// ==================== Toast提示 ====================
function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
  }, 2000);
}

// ==================== 初始化：恢复进度 ====================
(function init() {
  const saved = loadProgress();
  if (saved && saved.testType && saved.currentIndex < 10) {
    currentTest = saved.testType;
    currentQuestionIndex = saved.currentIndex;
    answers = saved.answers;
    showPage('test-page');
    renderQuestion();
  }
})();
